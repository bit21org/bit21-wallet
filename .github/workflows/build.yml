name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  mobile:
    name: Mobile build
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm ci
        working-directory: mobile
      - name: Sync web assets to Android
        run: |
          rm -rf mobile/android/app/src/main/assets/public
          mkdir -p mobile/android/app/src/main/assets/public
          cp -r frontend/dist/* mobile/android/app/src/main/assets/public/
      - run: chmod +x ./gradlew
        working-directory: mobile/android
      - run: ./gradlew assembleDebug
        working-directory: mobile/android
      - uses: actions/upload-artifact@v4
        with:
          name: bit21-mobile-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
