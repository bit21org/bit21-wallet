<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#08080A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="bit21" />
    <meta name="description" content="Non-custodial Bitcoin wallet. Send, receive, and manage your BTC." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>bit21</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100%; overflow: hidden; }
      body {
        background: #08080A;
        font-family: -apple-system, sans-serif;
        overflow: hidden;
        height: 100%;
        /* Disable rubber-band/overscroll bounce */
        overscroll-behavior: none;
        -webkit-overflow-scrolling: auto;
      }
      #root { height: 100%; overflow: hidden; }
      /* dvh fallback for older browsers */
      @supports not (height: 100dvh) {
        html, body, #root { height: -webkit-fill-available; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window._bit21InstallPrompt=e;});</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
